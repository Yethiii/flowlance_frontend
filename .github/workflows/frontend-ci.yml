name: Frontend CI (React/Vite)

# 1. QUAND DÉCLENCHER LE SCRIPT ?
# À chaque 'push' ou 'pull_request' sur la branche principale
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 2. QUE DOIT FAIRE LE SCRIPT ?
jobs:
  build-and-test:
    runs-on: ubuntu-latest # On utilise une machine virtuelle Linux (rapide et standard)

    steps:
    # A. Récupérer ton code depuis le dépôt GitHub
    - name: Checkout du code
      uses: actions/checkout@v4

    # B. Installer Node.js (l'environnement nécessaire pour faire tourner npm et React)
    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # On utilise une version LTS (Long Term Support) récente et stable
        cache: 'npm'       # Met en cache les dépendances pour accélérer les futures exécutions

    # C. Installer les dépendances (les bibliothèques de ton package.json)
    - name: Installation des dépendances
      run: npm ci --legacy-peer-deps
      # Note : On utilise "npm ci" (Clean Install) plutôt que "npm install" dans un CI/CD. 
      # C'est une commande stricte qui garantit d'installer très exactement les mêmes versions que sur ton ordinateur, sans modifier le fichier package-lock.json.

    # D. Vérifier la syntaxe et les règles de code (Linting)
    - name: Vérification du code (ESLint)
      run: npm run lint
      continue-on-error: true 
      # "continue-on-error" permet au pipeline de ne pas s'arrêter si le linter trouve de simples avertissements (warnings) de formatage.

    # E. Tenter de compiler l'application
    # C'est le test ultime : si cette étape passe, l'application n'a pas d'erreur critique de code.
    - name: Build de l'application
      run: npm run build